name = "obd2free-api"
main = "worker/index.ts"
compatibility_date = "2024-01-01"

# Workers
[vars]
ENVIRONMENT = "production"

# R2 bucket bindings
[[r2_buckets]]
binding = "LOGS_BUCKET"
bucket_name = "obd2free-logs"
preview_bucket_name = "obd2free-logs-dev"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "obd2free-db"
database_id = "${CLOUDFLARE_D1_DATABASE_ID}"

# KV namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "${CLOUDFLARE_KV_NAMESPACE_ID}"
preview_id = "${CLOUDFLARE_KV_NAMESPACE_ID_DEV}"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

[build]
command = "npm run build:worker"
