name: Release APK

# ─────────────────────────────────────────────────────────────
# SETUP INSTRUCTIONS (do this once):
#
# 1. Generate a keystore locally:
#    keytool -genkeypair -v -keystore obd2free-release.keystore \
#      -alias obd2free -keyalg RSA -keysize 2048 -validity 10000
#
# 2. Base64-encode the keystore:
#    base64 -i obd2free-release.keystore | pbcopy
#
# 3. Add these GitHub repo secrets:
#    REPO_KEYSTORE       (base64 output from step 2)
#    REPO_KEYSTORE_PASS  (keystore password you set in step 1)
#    REPO_KEY_ALIAS      (obd2free)
#    REPO_KEY_PASS       (key password you set in step 1)
#
# 4. Push a version tag to trigger:
#    git tag v0.1.0 && git push origin v0.1.0
# ─────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v0.1.0, v1.0.0, etc.

jobs:
  release:
    name: Build & Release APK
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode keystore
        run: |
          echo "${{ secrets.REPO_KEYSTORE }}" | base64 -d > android/app/release.keystore

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PRELEASE_KEYSTORE_PASS="${{ secrets.REPO_KEYSTORE_PASS }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.REPO_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASS="${{ secrets.REPO_KEY_PASS }}"
        env:
          ANDROID_KEYSTORE_PATH: ../app/release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/*.apk
